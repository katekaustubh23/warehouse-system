server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://host.docker.internal:8084
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1

        - id: auth-service
          uri: http://auth-service:8088
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://user-service:8087
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1

        - id: inventory-service
          uri: http://inventory-service:8082
          predicates:
            - Path=/inventory/**
          filters:
            - StripPrefix=1


management:
  endpoints:
    web:
      exposure:
        include: health,info


logging:
  level:
    root: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor: INFO
