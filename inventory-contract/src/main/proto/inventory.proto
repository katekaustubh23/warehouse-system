syntax = "proto3";

option java_package = "com.inventory.grpc";
option java_multiple_files = true;

service InventoryService {
  rpc reserveStock (ReserveStock) returns (ReserveStockResponse);
}

message ReserveStock {
  int64 orderId = 1;
  repeated OrderItem items = 2;
}

message OrderItem {
  int64 productId = 1;
  int32 quantity = 2;
}

message ReserveStockResponse {
  int64 orderId = 1;
  repeated ItemStatus items = 2;
}

message ItemStatus {
  int64 productId = 1;
  bool reserved = 2;
}